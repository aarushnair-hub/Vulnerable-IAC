name: Checkov Security Scan

on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]

# Explicitly sets default permissions to read-only for security best practices
permissions: read-all

jobs:
  checkov-scan:
    runs-on: ubuntu-latest
    
    # Grants the runner specific permission to upload the results to your Security tab
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: '.'
          
          # This is the magic line! It outputs a SARIF file that GitHub uses to group by file
          output_format: cli,sarif
          output_file_path: console,results.sarif
          
          # Optional: Allows the pipeline to pass even if vulnerabilities are found
          soft_fail: true 
          
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure() # Ensures the upload happens even if Checkov finds issues
        with:
          sarif_file: results.sarif
