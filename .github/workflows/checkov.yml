name: Checkov Security Scan

on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]

jobs:
  checkov-scan:
    runs-on: ubuntu-latest
    
    # ---------------------------------------------------------
    # THIS IS THE FIX: We explicitly grant the runner permission 
    # to write the SARIF results into your Security tab.
    # ---------------------------------------------------------
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: '.'
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: true 
          
      - name: Upload SARIF file
        # Upgraded to v4 to remove the deprecation warning
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure() 
        with:
          sarif_file: results.sarif
