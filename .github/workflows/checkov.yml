name: Checkov Security Scan

# Triggers the workflow on Push or Pull Request to the main branch
on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]

jobs:
  checkov-scan:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Run Checkov directly
      # (It will automatically find and scan the plan.json files you pushed)
      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: '.'
          
          # Output both to the terminal (cli) and to a SARIF file
          output_format: cli,sarif
          output_file_path: console,results.sarif
          
          # We soft fail here so the pipeline doesn't crash before uploading the report
          soft_fail: true 
          
      # Step 3: Upload results to GitHub Security tab for grouping
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure() # Ensures upload happens even if vulnerabilities are found
        with:
          sarif_file: results.sarif
