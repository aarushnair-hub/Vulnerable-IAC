################################################################################
#  kubernetes/bad-workloads.yaml  —  INTENTIONALLY INSECURE K8S MANIFESTS
#  DO NOT APPLY.  Test fixture for Checkov (kubernetes) / OX scanning.
#  Trips: CKV_K8S_* (privileged, root, no limits, host namespaces, caps, ...)
####################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-deployment
  namespace: default
  labels:
    app: insecure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insecure
  template:
    metadata:
      labels:
        app: insecure
    spec:
      hostNetwork: true              # CKV_K8S_19
      hostPID: true                  # CKV_K8S_17
      hostIPC: true                  # CKV_K8S_18
      automountServiceAccountToken: true   # CKV_K8S_34/...
      containers:
        - name: app
          image: nginx:latest        # CKV_K8S_43 (no digest) / latest tag
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          securityContext:
            privileged: true                       # CKV_K8S_16
            allowPrivilegeEscalation: true         # CKV_K8S_20
            runAsNonRoot: false                    # CKV_K8S_23
            runAsUser: 0                           # runs as root
            readOnlyRootFilesystem: false          # CKV_K8S_22
            capabilities:
              add: ["SYS_ADMIN", "NET_ADMIN", "ALL"]   # CKV_K8S_28/37
          # no resources.limits / requests              CKV_K8S_10/11/12/13
          # no livenessProbe / readinessProbe           CKV_K8S_8/9
          volumeMounts:
            - name: host-root
              mountPath: /host
      volumes:
        - name: host-root
          hostPath:                  # CKV_K8S_27 / mounting host filesystem
            path: /
---
apiVersion: v1
kind: Pod
metadata:
  name: insecure-pod
  namespace: default
spec:
  containers:
    - name: shell
      image: alpine               # no tag pin / no digest
      command: ["sleep", "infinity"]
      securityContext:
        privileged: true
      env:
        - name: AWS_SECRET_ACCESS_KEY
          value: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"   # plaintext secret
---
apiVersion: v1
kind: Service
metadata:
  name: insecure-svc
spec:
  type: LoadBalancer
  selector:
    app: insecure
  ports:
    - port: 80
      targetPort: 80
---
# Overly-permissive RBAC  (CKV_K8S_49 / wildcard RBAC)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-admin-clone
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
